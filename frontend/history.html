<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Waste-AI | History</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <nav class="modern-navbar">
    <div class="nav-container">
      <div class="nav-brand">
        <h2><i class="fas fa-recycle"></i> Waste-<span class="brand-accent">AI</span></h2>
      </div>
      <ul class="nav-menu">
        <li><a href="home.html" class="nav-link">Home</a></li>
        <li><a href="upload.html" class="nav-link">Upload</a></li>
        <li><a href="history.html" class="nav-link active">History</a></li>
        <li><a href="settings.html" class="nav-link">Settings</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
      </ul>
      <div class="nav-actions">
        <button class="nav-btn"><i class="fas fa-user"></i></button>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="history-section">
      <div class="card">
        <div class="history-header">
          <div class="header-content">
            <h1><i class="fas fa-history"></i> Classification History</h1>
            <p class="lead">Track your waste classification journey and environmental impact</p>
          </div>
          <div class="stats-cards">
            <div class="stat-card">
              <div class="stat-icon">
                <i class="fas fa-chart-line"></i>
              </div>
              <div class="stat-content">
                <span class="stat-number" id="total-classifications">0</span>
                <span class="stat-label">Total Classifications</span>
              </div>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input id="search" class="form-input search-input" placeholder="Search by type or date..." />
          </div>
          <div class="filter-buttons">
            <button class="btn btn-secondary filter-btn active" data-filter="all">
              <i class="fas fa-list"></i> All
            </button>
            <button class="btn btn-secondary filter-btn" data-filter="organic">
              <i class="fas fa-seedling"></i> Organic
            </button>
            <button class="btn btn-secondary filter-btn" data-filter="recyclable">
              <i class="fas fa-recycle"></i> Recyclable
            </button>
            <button class="btn btn-secondary filter-btn" data-filter="hazardous">
              <i class="fas fa-exclamation-triangle"></i> Hazardous
            </button>
            <button class="btn btn-secondary filter-btn" data-filter="general">
              <i class="fas fa-trash"></i> General
            </button>
          </div>
          <button id="export-history" class="btn btn-primary">
            <i class="fas fa-download"></i> Export Data
          </button>
        </div>

        <div id="history-list" class="history-list" aria-live="polite">
          <!-- Populated by JS -->
        </div>

        <div id="empty-state" class="empty-state" style="display: none;">
          <i class="fas fa-history empty-icon"></i>
          <h3>No Classifications Yet</h3>
          <p>Start classifying waste to see your history here</p>
          <a href="upload.html" class="btn btn-primary">
            <i class="fas fa-upload"></i> Upload First Image
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const historyListEl = document.getElementById("history-list");
    const searchInput = document.getElementById("search");
    const exportBtn = document.getElementById("export-history");
    const filterBtns = document.querySelectorAll(".filter-btn");
    const emptyState = document.getElementById("empty-state");
    const totalClassificationsEl = document.getElementById("total-classifications");

    let historyData = [];
    let currentFilter = "all";

    // ✅ Fetch history from backend
    async function loadHistory() {
      try {
        const res = await fetch("http://127.0.0.1:5001/history/1"); // user_id = 1 for now
        historyData = await res.json();
        updateStats();
        renderList();
      } catch (err) {
        historyListEl.innerHTML = `
          <div class="error-state">
            <i class="fas fa-exclamation-triangle"></i>
            <h3>Error Loading History</h3>
            <p>Unable to fetch your classification history. Please try again later.</p>
          </div>
        `;
        console.error(err);
      }
    }

    // ✅ Update statistics
    function updateStats() {
      totalClassificationsEl.textContent = historyData.length;
      
    }

    // ✅ Render history
    function renderList(searchTerm = "") {
      historyListEl.innerHTML = "";

      let filtered = historyData.filter(item => {
        // Apply search filter
        if (searchTerm) {
          const searchText = (item.prediction + " " + (item.timestamp || "")).toLowerCase();
          if (!searchText.includes(searchTerm.toLowerCase())) return false;
        }
        
        // Apply category filter
        if (currentFilter !== "all") {
          return item.prediction.toLowerCase() === currentFilter;
        }
        
        return true;
      });

      if (filtered.length === 0) {
        if (historyData.length === 0) {
          emptyState.style.display = "block";
        } else {
          historyListEl.innerHTML = `
            <div class="no-results">
              <i class="fas fa-search"></i>
              <h3>No Results Found</h3>
              <p>Try adjusting your search or filter criteria</p>
            </div>
          `;
        }
        return;
      }

      emptyState.style.display = "none";

      // Sort by timestamp (newest first)
      filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      filtered.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "history-item slide-up";
        div.style.animationDelay = `${index * 0.1}s`;
        
        const typeIcon = getTypeIcon(item.prediction.toLowerCase());
        const typeColor = getTypeColor(item.prediction.toLowerCase());
        
        div.innerHTML = `
          <div class="item-thumbnail">
            <img class="thumb" src="data/raw/delhi/${item.filename}" alt="Classification thumbnail" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIiBmaWxsPSIjRjVGNUY1Ii8+CjxwYXRoIGQ9Ik01MCAyNUM2Mi4xIDI1IDcyIDM0LjkgNzIgNDdDNzIgNTkuMSA2Mi4xIDY5IDUwIDY5QzM3LjkgNjkgMjggNTkuMSAyOCA0N0MyOCAzNC45IDM3LjkgMjUgNTAgMjVaIiBmaWxsPSIjQ0NDQ0NDIi8+CjxwYXRoIGQ9Ik01MCAzNUM1NS41IDM1IDYwIDM5LjUgNjAgNDVDNjAgNTAuNSA1NS41IDU1IDUwIDU1QzQ0LjUgNTUgNDAgNTAuNSA0MCA0NUM0MCAzOS41IDQ0LjUgMzUgNTAgMzVaIiBmaWxsPSIjOTk5OTk5Ii8+Cjwvc3ZnPgo='"/>
            <div class="type-badge" style="background-color: ${typeColor}">
              ${typeIcon}
            </div>
          </div>
          <div class="item-content">
            <div class="item-header">
              <h3 class="prediction-type">${item.prediction.charAt(0).toUpperCase() + item.prediction.slice(1)}</h3>
              <span class="item-date">${formatDate(item.timestamp)}</span>
            </div>
            <div class="item-meta">
              <span class="filename">${item.filename}</span>
              <div class="item-actions">
                <button class="action-btn" onclick="viewDetails(${item.id})" title="View Details">
                  <i class="fas fa-eye"></i>
                </button>
                <button class="action-btn" onclick="shareResult(${item.id})" title="Share">
                  <i class="fas fa-share"></i>
                </button>
              </div>
            </div>
          </div>
        `;
        historyListEl.appendChild(div);
      });
    }

    // ✅ Helper functions
    function getTypeIcon(type) {
      const icons = {
        organic: '<i class="fas fa-seedling"></i>',
        recyclable: '<i class="fas fa-recycle"></i>',
        hazardous: '<i class="fas fa-exclamation-triangle"></i>',
        general: '<i class="fas fa-trash"></i>'
      };
      return icons[type] || '<i class="fas fa-question"></i>';
    }

    function getTypeColor(type) {
      const colors = {
        organic: '#4caf50',
        recyclable: '#2196f3',
        hazardous: '#ff9800',
        general: '#9e9e9e'
      };
      return colors[type] || '#9e9e9e';
    }

    function formatDate(timestamp) {
      if (!timestamp) return 'Unknown date';
      const date = new Date(timestamp);
      return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }

    // ✅ Filter functionality
    filterBtns.forEach(btn => {
      btn.addEventListener("click", () => {
        filterBtns.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        renderList(searchInput.value.trim());
      });
    });

    // ✅ Export as JSON
    exportBtn.addEventListener("click", () => {
      const dataToExport = {
        exportDate: new Date().toISOString(),
        totalClassifications: historyData.length,
        classifications: historyData
      };
      
      const blob = new Blob([JSON.stringify(dataToExport, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `waste-ai-history-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
    });

    // ✅ Search functionality
    searchInput.addEventListener("input", (e) => {
      renderList(e.target.value.trim());
    });

    // ✅ Global functions for action buttons
    window.viewDetails = function(id) {
      const item = historyData.find(i => i.id === id);
      if (item) {
        alert(`Details for ${item.prediction} classification:\n\nFile: ${item.filename}\nDate: ${formatDate(item.timestamp)}\nID: ${item.id}`);
      }
    };

    window.shareResult = function(id) {
      const item = historyData.find(i => i.id === id);
      if (item) {
        const shareText = `I just classified waste as ${item.prediction} using Waste-AI! ♻️`;
        if (navigator.share) {
          navigator.share({ text: shareText });
        } else {
          navigator.clipboard.writeText(shareText).then(() => {
            alert('Share text copied to clipboard!');
          });
        }
      }
    };

    // Load on page start
    loadHistory();
  </script>
</body>
</html>
